<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ZIKOGS // NEON TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --neon: #00f3ff; --bg: #050a0f; --card: #0d161f; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: var(--neon); }

        /* Navbar & Filter */
        .navbar { padding: 1.5rem; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; }
        .filter-bar { padding: 1rem 2rem; display: flex; gap: 15px; border-bottom: 1px solid #1a3a4a; }
        
        /* Buttons Casual Hi-Tech */
        button { 
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 8px 15px; cursor: pointer; transition: 0.3s;
        }
        button:hover, button.active { background: var(--neon); color: var(--bg); }

        /* Board & Lanes */
        .board { display: flex; gap: 20px; padding: 20px; overflow-x: auto; }
        .lane { min-width: 250px; }
        .lane h3 { font-size: 0.7rem; margin-bottom: 15px; opacity: 0.6; }

        /* BUBBLE EFFECT CARD */
        .task-card { 
            background: var(--card); padding: 15px; margin-bottom: 15px; 
            border: 1px solid var(--neon); border-radius: 20px; /* Bubble rounded */
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1); 
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .task-card:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--neon); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div>// ZIKOGS_WORKSTATION_V1</div>
        <div id="clock">SYSTEM_READY</div>
    </nav>

    <div class="filter-bar">
        <button class="active" onclick="filterData('All', this)">ALL</button>
        <button onclick="filterData('SEWA', this)">SEWA</button>
        <button onclick="filterData('ANALISIS', this)">ANALISIS</button>
        <button onclick="filterData('KHUSUS', this)">KHUSUS</button>
    </div>

    <div class="board" id="board"></div>

    <script>
        const steps = ["AJUAN", "PROSES", "BIDANG_LAIN", "REVIEW_KABAG", "KIRIM_MM", "DONE"];
        const data = Array.from({length: 15}, (_, i) => ({
            id: i, gedung: `UNIT_0${i+1}`,
            kategori: ['SEWA', 'ANALISIS', 'KHUSUS'][i % 3],
            step: steps[i % 6]
        }));

        function filterData(cat, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(cat === 'All' ? data : data.filter(t => t.kategori === cat));
        }

        function render(filtered = data) {
            const board = document.getElementById('board');
            board.innerHTML = steps.map(step => `
                <div class="lane">
                    <h3>[${step}]</h3>
                    ${filtered.filter(t => t.step === step).map(t => `
                        <div class="task-card">
                            <strong>${t.gedung}</strong>
                            <small>TYPE: ${t.kategori}</small>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }
        render();
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
