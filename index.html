<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIKOGS Worksheets</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        :root { --primary: #4f46e5; --bg: #f8fafc; --text: #1e293b; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); }

        /* Navbar */
        .navbar { background: white; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .logo { font-weight: 600; font-size: 1.2rem; }

        /* Tabs & Filters */
        .controls { padding: 2rem; display: flex; gap: 10px; align-items: center; }
        button { padding: 10px 16px; border-radius: 8px; border: none; background: #e2e8f0; cursor: pointer; transition: 0.3s; }
        button:hover { background: #cbd5e1; }
        .active { background: var(--primary); color: white; }

        /* Board */
        .board { padding: 0 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .task-card { background: white; padding: 20px; border-radius: 16px; border-left: 6px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.03); cursor: pointer; transition: 0.3s; }
        .task-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        
        /* Modal */
        dialog { padding: 2rem; border-radius: 20px; border: none; width: 400px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); }
        .step-pill { display: inline-block; padding: 4px 12px; border-radius: 20px; background: #e0e7ff; color: var(--primary); font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">ZIKOGS Worksheets</div>
    </nav>

    <div class="controls">
        <button class="active" onclick="setCategory('Sewa')">Sewa Gedung</button>
        <button onclick="setCategory('Analisis')">Analisis Gedung</button>
        <button onclick="setCategory('Khusus')">Tugas Khusus</button>
        <div id="yearSelect" style="display:none; margin-left:10px;">
            <select onchange="filterYear(this.value)">
                <option value="All">Semua Tahun</option>
                <option value="2026">2026</option>
                <option value="2027">2027</option>
            </select>
        </div>
    </div>

    <main class="board" id="board"></main>

    <dialog id="modal">
        <h2 id="modalTitle">Detail Gedung</h2>
        <div id="modalContent" style="margin: 20px 0;"></div>
        <button onclick="document.getElementById('modal').close()" style="width:100%">Tutup</button>
    </dialog>

    <script>
        const steps = ["Ajuan", "Proses Pengerjaan", "Proses di bidang lain", "Review Kabag", "Kirim ke MM", "Selesai"];
        const data = Array.from({length: 20}, (_, i) => ({
            id: i, gedung: `Gedung ${String.fromCharCode(65 + (i % 5))}`,
            kategori: ['Sewa', 'Analisis', 'Khusus'][i % 3],
            sewaHabis: 2026 + (i % 2), step: steps[i % 6]
        }));

        function render(filtered = data) {
            const board = document.getElementById('board');
            board.innerHTML = filtered.map(t => `
                <div class="task-card" onclick="bukaModal('${t.gedung}')">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${t.gedung}</strong>
                        <span class="step-pill">${t.step}</span>
                    </div>
                    <p style="font-size:0.9rem; color:#64748b; margin-top:10px;">${t.kategori} | Habis: ${t.sewaHabis}</p>
                </div>
            `).join('');
        }

        function setCategory(cat) {
            document.getElementById('yearSelect').style.display = (cat === 'Sewa') ? 'block' : 'none';
            render(data.filter(t => t.kategori === cat));
        }

        function bukaModal(nama) {
            const list = data.filter(t => t.gedung === nama);
            document.getElementById('modalTitle').innerText = nama;
            document.getElementById('modalContent').innerHTML = list.map(t => 
                `<div><strong>${t.kategori}:</strong> ${t.step}</div>`).join('');
            document.getElementById('modal').showModal();
        }

        render();
    </script>
</body>
</html>
