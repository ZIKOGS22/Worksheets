<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ZIKOGS Worksheets</title>
    <style>
        :root { --primary: #1a2a3a; --bg: #f0f2f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); }
        .navbar { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; }
        .tabs { display: flex; gap: 10px; padding: 10px 20px; background: white; border-bottom: 1px solid #ddd; }
        .board { display: flex; gap: 20px; padding: 20px; overflow-x: auto; }
        .column { background: #ebedf0; min-width: 300px; padding: 15px; border-radius: 10px; }
        .task-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #ccc; cursor: pointer; }
        /* Warna berdasarkan kategori */
        .sewa { border-left-color: #2ecc71; }
        .analisis { border-left-color: #e67e22; }
        .khusus { border-left-color: #9b59b6; }
        .produktif { border-left-color: #3498db; }
        dialog { padding: 20px; border-radius: 10px; border: none; width: 400px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div>ZIKOGS Worksheets</div>
        <div id="yearFilter" style="display:none;">
            Tahun Sewa: <button onclick="filterByYear(2026)">2026</button> <button onclick="filterByYear(2027)">2027</button>
        </div>
    </nav>

    <div class="tabs">
        <button onclick="setCategory('Sewa')">Sewa Gedung</button>
        <button onclick="setCategory('Analisis')">Analisis Gedung</button>
        <button onclick="setCategory('Khusus')">Tugas Khusus</button>
        <button onclick="setCategory('Produktivitas')">Produktivitas</button>
    </div>

    <main class="board" id="board"></main>

    <dialog id="modal">
        <h2 id="modalTitle">Gedung A</h2>
        <p id="modalInfo"></p>
        <button onclick="document.getElementById('modal').close()">Tutup</button>
    </dialog>

    <script>
        // Data Dummy 20 item
        const data = Array.from({length: 20}, (_, i) => ({
            id: i + 1,
            gedung: `Gedung ${String.fromCharCode(65 + (i % 5))}`,
            kategori: ['Sewa', 'Analisis', 'Khusus', 'Produktivitas'][i % 4],
            sewaHabis: 2026 + (i % 2),
            progres: (i * 5) % 100
        }));

        function render(filteredData = data) {
            const board = document.getElementById('board');
            board.innerHTML = `
                <div class="column">
                    <h3>Progres Tugas</h3>
                    ${filteredData.map(t => `
                        <div class="task-card ${t.kategori.toLowerCase()}" onclick="bukaGedung('${t.gedung}')">
                            <strong>${t.gedung}</strong><br>
                            Kategori: ${t.kategori}<br>
                            Sewa Habis: ${t.sewaHabis}<br>
                            Progres: ${t.progres}%
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function setCategory(cat) {
            document.getElementById('yearFilter').style.display = (cat === 'Sewa') ? 'block' : 'none';
            render(data.filter(t => t.kategori === cat));
        }

        function filterByYear(year) {
            render(data.filter(t => t.sewaHabis === year));
        }

        function bukaGedung(namaGedung) {
            const semuaTugas = data.filter(t => t.gedung === namaGedung);
            document.getElementById('modalTitle').innerText = namaGedung;
            document.getElementById('modalInfo').innerHTML = semuaTugas.map(t => 
                `<li>${t.kategori}: ${t.progres}%</li>`
            ).join('');
            document.getElementById('modal').showModal();
        }

        render();
    </script>
</body>
</html>
