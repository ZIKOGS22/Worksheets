<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ZIKOGS // RED_PROTOCOL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        /* Palet Warna Red & Gold */
        :root { 
            --red: #ff3e3e; 
            --gold: #ffcc00; 
            --bg: #1a0505; 
            --card: #2a0a0a; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: var(--gold); overflow-x: hidden; }

        /* Efek Garis Scanline */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(255, 62, 62, 0.05) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 10;
        }

        .navbar { padding: 1.5rem; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; color: var(--red); }
        .filter-bar { padding: 1rem 2rem; display: flex; gap: 15px; border-bottom: 1px solid #4a1a1a; }
        
        button { 
            background: transparent; border: 1px solid var(--red); color: var(--red);
            padding: 8px 15px; cursor: pointer; transition: 0.3s;
        }
        button:hover, button.active { background: var(--red); color: white; }

        .board { display: flex; gap: 20px; padding: 20px; overflow-x: auto; }
        .lane { min-width: 250px; border-left: 1px solid #4a1a1a; padding: 10px; }
        .lane h3 { font-size: 0.7rem; margin-bottom: 15px; color: var(--red); border-bottom: 1px solid var(--red); padding-bottom: 5px; }

        .task-card { 
            background: var(--card); padding: 15px; margin-bottom: 15px; 
            border: 1px solid var(--gold); border-radius: 20px; 
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.1); 
            cursor: pointer; transition: 0.4s;
        }
        .task-card:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--gold); border-color: var(--red); }
        .task-card strong { display: block; font-size: 0.8rem; margin-bottom: 5px; color: white; }
        .task-card small { font-size: 0.65rem; color: var(--gold); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div>// RED_PROTOCOL_ACTIVE</div>
        <div id="clock">SYSTEM_READY</div>
    </nav>

    <div class="filter-bar">
        <button class="active" onclick="filterData('All', this)">ALL</button>
        <button onclick="filterData('SEWA', this)">SEWA</button>
        <button onclick="filterData('ANALISIS', this)">ANALISIS</button>
        <button onclick="filterData('KHUSUS', this)">KHUSUS</button>
    </div>

    <div class="board" id="board"></div>

    <script>
        const steps = ["AJUAN", "PROSES", "BIDANG_LAIN", "REVIEW_KABAG", "KIRIM_MM", "DONE"];
        const data = Array.from({length: 15}, (_, i) => ({
            id: i, gedung: `UNIT_0${i+1}`,
            kategori: ['SEWA', 'ANALISIS', 'KHUSUS'][i % 3],
            step: steps[i % 6]
        }));

        function filterData(cat, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(cat === 'All' ? data : data.filter(t => t.kategori === cat));
        }

        function render(filtered = data) {
            const board = document.getElementById('board');
            board.innerHTML = steps.map(step => `
                <div class="lane">
                    <h3>[${step}]</h3>
                    ${filtered.filter(t => t.step === step).map(t => `
                        <div class="task-card">
                            <strong>${t.gedung}</strong>
                            <small>TYPE: ${t.kategori}</small>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }
        render();
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
