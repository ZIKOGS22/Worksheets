<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ZIKOGS // NEON TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --neon: #00f3ff; --bg: #050a0f; --card: #0d161f; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: var(--neon); overflow-x: hidden; }

        /* Navbar */
        .navbar { padding: 1.5rem; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; text-transform: uppercase; letter-spacing: 3px; }
        
        /* Swimlane */
        .board { display: flex; gap: 20px; padding: 20px; overflow-x: auto; height: 85vh; }
        .lane { min-width: 280px; border-left: 1px solid #1a3a4a; padding: 10px; }
        .lane h3 { font-size: 0.7rem; margin-bottom: 15px; border-bottom: 1px solid var(--neon); padding-bottom: 5px; }

        /* Task Card - HiTech */
        .task-card { 
            background: var(--card); padding: 15px; margin-bottom: 15px; border: 1px solid var(--neon); 
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); cursor: pointer; transition: 0.3s;
        }
        .task-card:hover { box-shadow: 0 0 20px var(--neon); background: #152230; }
        .task-card strong { display: block; font-size: 0.8rem; margin-bottom: 5px; color: white; }
        .task-card small { font-size: 0.65rem; opacity: 0.7; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { height: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div>// ZIKOGS_WORKSTATION_V1</div>
        <div id="clock">SYSTEM_READY</div>
    </nav>

    <div class="board" id="board"></div>

    <script>
        const steps = ["AJUAN", "PROSES", "BIDANG_LAIN", "REVIEW_KABAG", "KIRIM_MM", "DONE"];
        const data = Array.from({length: 15}, (_, i) => ({
            id: i, gedung: `UNIT_0${i+1}`,
            kategori: ['SEWA', 'ANALISIS', 'KHUSUS'][i % 3],
            step: steps[i % 6]
        }));

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = steps.map(step => `
                <div class="lane">
                    <h3>[${step}]</h3>
                    ${data.filter(t => t.step === step).map(t => `
                        <div class="task-card">
                            <strong>${t.gedung}</strong>
                            <small>TYPE: ${t.kategori}</small>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }
        render();
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
