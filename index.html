<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ZIKOGS // RED_PROTOCOL_DATA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --red: #ff3e3e; --gold: #ffcc00; --bg: #1a0505; --card: #2a0a0a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: var(--gold); }

        /* Board & Card */
        .board { display: flex; gap: 20px; padding: 20px; overflow-x: auto; }
        .lane { min-width: 280px; border-left: 1px solid #4a1a1a; padding: 10px; }
        .lane h3 { font-size: 0.7rem; color: var(--red); border-bottom: 1px solid var(--red); padding-bottom: 5px; margin-bottom: 10px; }
        .task-card { background: var(--card); padding: 15px; margin-bottom: 15px; border: 1px solid var(--gold); border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .task-card:hover { transform: scale(1.03); border-color: var(--red); }
        
        /* Modal */
        dialog { background: #1a0505; border: 1px solid var(--red); color: white; padding: 20px; border-radius: 20px; width: 500px; }
        .note-item { font-size: 0.8rem; border-bottom: 1px solid #4a1a1a; padding: 5px 0; color: #ffcc00; }
    </style>
</head>
<body>

    <nav style="padding: 1.5rem; border-bottom: 2px solid var(--red); color: var(--red);">// RED_PROTOCOL_DATA_MANAGEMENT</nav>

    <div class="board" id="board"></div>

    <dialog id="gedungModal">
        <h2 id="modalTitle" style="color: var(--red);"></h2>
        <div id="modalDetails" style="margin: 15px 0; font-size: 0.9rem;"></div>
        <h3 style="margin-top: 15px;">Catatan Khusus (Max 5):</h3>
        <div id="modalNotes"></div>
        <button onclick="document.getElementById('gedungModal').close()" style="margin-top: 20px; background:transparent; color:white; border:1px solid white; padding:5px 15px; cursor:pointer;">CLOSE</button>
    </dialog>

    <script>
        // Data Gedung dengan 6 Field & 5 Catatan
        const gedungData = [
            {
                id: 1, namaCabang: "Bandung", kota: "Bandung", sekretariat: "Sekre A", 
                gedung: "Gedung Sudirman", tglAwal: "2024-01-01", tglAkhir: "2027-01-01",
                notes: ["AC Lantai 2 rusak", "Perlu cat ulang depan"]
            },
            {
                id: 2, namaCabang: "Jakarta", kota: "Jakarta", sekretariat: "Sekre B", 
                gedung: "Gedung Kuningan", tglAwal: "2023-05-01", tglAkhir: "2026-05-01",
                notes: ["Parkiran penuh", "Kontrak akan habis segera"]
            }
        ];

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = `
                <div class="lane">
                    <h3>[DATA_GEDUNG]</h3>
                    ${gedungData.map(g => `
                        <div class="task-card" onclick="bukaDetail(${g.id})">
                            <strong>${g.gedung}</strong>
                            <small>${g.namaCabang} - ${g.kota}</small>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function bukaDetail(id) {
            const g = gedungData.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = g.gedung;
            document.getElementById('modalDetails').innerHTML = `
                Cabang: ${g.namaCabang}<br>Sekretariat: ${g.sekretariat}<br>
                Sewa: ${g.tglAwal} s/d ${g.tglAkhir}
            `;
            document.getElementById('modalNotes').innerHTML = g.notes.map((n, i) => 
                `<div class="note-item">${i+1}. ${n}</div>`).join('') + 
                (g.notes.length < 5 ? `<div style="font-size:0.7rem; margin-top:10px;">+ Tambah Catatan</div>` : "");
            document.getElementById('gedungModal').showModal();
        }

        render();
    </script>
</body>
</html>
