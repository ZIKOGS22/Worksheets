<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ZIKOGS Worksheets</title>
    <style>
        :root { --primary: #1a2a3a; --bg: #f0f2f5; --card: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); }
        
        /* Navbar */
        .navbar { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        
        /* Filter Bar */
        .filter-bar { background: white; padding: 1rem 2rem; display: flex; gap: 20px; align-items: center; border-bottom: 1px solid #ddd; }
        
        /* Kanban Board */
        .board { display: flex; gap: 20px; padding: 20px; overflow-x: auto; align-items: flex-start; }
        .column { background: #ebedf0; min-width: 300px; padding: 15px; border-radius: 10px; }
        .column h3 { margin-bottom: 15px; color: #555; }
        
        /* Task Card */
        .task-card { background: var(--card); padding: 15px; margin-bottom: 15px; border-radius: 8px; border-left: 5px solid #ccc; cursor: pointer; transition: 0.3s; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .sewa { border-left-color: #2ecc71; }
        .kondisi { border-left-color: #e67e22; }
        .khusus { border-left-color: #9b59b6; }
        .progress-bg { height: 8px; background: #eee; border-radius: 4px; margin: 10px 0; }
        .progress-fill { height: 100%; background: #27ae60; border-radius: 4px; }
        
        /* Modal */
        dialog { padding: 25px; border-radius: 12px; border: none; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-weight:bold; font-size:1.5rem;">ZIKOGS Worksheets</div>
        <button class="btn" onclick="tambahKategori()">+ Tambah Kategori</button>
    </nav>

    <section class="filter-bar">
        <div><strong>Filter Tahun Sewa:</strong> 
            <button>All</button> <button>2026</button> <button>2027</button>
        </div>
    </section>

    <main class="board" id="board">
        <div class="column">
            <h3>Backlog</h3>
            <div class="task-card sewa" onclick="bukaModal('Perpanjangan Gedung Sudirman')">
                <strong>Perpanjangan Gedung Sudirman</strong>
                <div style="font-size: 0.8rem; color: #666;">Sewa Habis: 2027</div>
                <div class="progress-bg"><div class="progress-fill" style="width: 40%"></div></div>
            </div>
        </div>
        <div class="column">
            <h3>In Progress</h3>
            <div class="task-card kondisi" onclick="bukaModal('Analisis Atap Bandung')">
                <strong>Analisis Atap Bandung</strong>
                <div style="font-size: 0.8rem; color: #666;">Sewa Habis: 2025</div>
                <div class="progress-bg"><div class="progress-fill" style="width: 70%"></div></div>
            </div>
        </div>
    </main>

    <!-- Modal Update -->
    <dialog id="taskModal">
        <h2 id="modalTitle">Update Tugas</h2>
        <label>Progres (%):</label>
        <input type="number" id="progressInput" placeholder="Masukkan angka 0-100">
        <label>Catatan:</label>
        <textarea id="noteInput" placeholder="Apa perkembangan terbaru?"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="btn" onclick="simpanData()">Simpan</button>
            <button onclick="document.getElementById('taskModal').close()">Batal</button>
        </div>
    </dialog>

    <script>
        function bukaModal(title) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('taskModal').showModal();
        }

        function simpanData() {
            let prog = document.getElementById('progressInput').value;
            let note = document.getElementById('noteInput').value;
            alert("Data tersimpan: " + prog + "% - Catatan: " + note);
            document.getElementById('taskModal').close();
        }

        function tambahKategori() {
            let nama = prompt("Nama Kategori Baru:");
            if(nama) {
                const board = document.getElementById('board');
                board.innerHTML += `<div class="column"><h3>${nama}</h3></div>`;
            }
        }
    </script>
</body>
</html>
